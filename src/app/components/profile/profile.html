<div class="container py-5 mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      
      <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="mt-3 text-muted">Loading your profile...</p>
      </div>

      <div *ngIf="!loading && !userId" class="text-center py-5">
        <i class="fas fa-user-times fa-4x text-muted mb-3"></i>
        <h3 class="text-muted">You are not logged in.</h3>
      </div>

      <div class="card profile-card shadow-lg border-0" *ngIf="!loading && userId">
        <div class="card-header bg-gradient text-white p-4 text-center">
          <div class="profile-avatar mb-3">
            <i class="fas fa-user fa-3x"></i>
          </div>
          <h3 class="mb-0 fw-bold">{{ model.FirstName }} {{ model.LastName }}</h3>
          <p class="mb-0 text-white-50">{{ model.Email }}</p>
        </div>
        
        <div class="card-body p-5">
          <form (ngSubmit)="onSubmit()">
            <h5 class="fw-bold mb-4 border-bottom pb-2 text-primary">Personal Information</h5>
            
            <div class="row g-4">
              <div class="col-md-6">
                <label class="form-label fw-semibold">First Name</label>
                <input type="text" class="form-control" [(ngModel)]="model.FirstName" name="FirstName">
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Last Name</label>
                <input type="text" class="form-control" [(ngModel)]="model.LastName" name="LastName">
              </div>
              
              <div class="col-md-6">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" class="form-control" [(ngModel)]="model.UserName" name="UserName" disabled>
                <small class="text-muted">Username cannot be changed.</small>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Email Address</label>
                <input type="email" class="form-control" [(ngModel)]="model.Email" name="Email" disabled>
                <small class="text-muted">Email cannot be changed.</small>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Phone Number</label>
                <input type="text" class="form-control" [(ngModel)]="model.PhoneNumber" name="PhoneNumber">
              </div>

              <div class="col-12">
                <label class="form-label fw-semibold">Address</label>
                <input type="text" class="form-control" [(ngModel)]="model.Address" name="Address">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">Country</label>
                <input type="text" class="form-control" [(ngModel)]="model.Country" name="Country">
              </div>
            </div>

            <div class="d-grid mt-5">
              <button type="submit" class="btn btn-primary btn-lg shadow-sm" [disabled]="saving">
                <span *ngIf="saving" class="spinner-border spinner-border-sm me-2"></span>
                <i *ngIf="!saving" class="fas fa-save me-2"></i> {{ saving ? 'Saving Changes...' : 'Update Profile' }}
              </button>
            </div>
          </form>
        </div>
      </div>
      
    </div>
  </div>
</div>
