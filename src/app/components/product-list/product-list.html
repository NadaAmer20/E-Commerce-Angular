<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="display-5 fw-bold text-primary">Our Products</h1>
    <button class="btn btn-primary btn-lg shadow-sm" routerLink="/products/add">
      <i class="fas fa-plus-circle me-2"></i>Add New Product
    </button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3 text-muted">Loading products...</p>
  </div>

  <div class="row g-4" *ngIf="!loading">
    <div *ngFor="let prod of products" class="col-md-6 col-lg-4">
      <div class="card h-100 border-0 shadow-sm product-card">
        <div class="position-relative" style="cursor:pointer;" [routerLink]="['/products', prod.productID]">
          <div class="image-placeholder bg-light d-flex justify-content-center align-items-center"
            style="height: 200px;">
            <img *ngIf="prod.imageUrls?.length > 0" [src]="prod.imageUrls[0]"
              class="img-fluid h-100 w-100 object-fit-cover" alt="Product image">
            <i *ngIf="!prod.imageUrls || prod.imageUrls.length === 0"
              class="fas fa-shopping-bag fa-4x text-secondary"></i>
          </div>
          <span class="badge bg-success position-absolute top-0 end-0 m-3">{{ prod.price | currency }}</span>
          <span *ngIf="getCategoryName(prod.categoryId)" class="badge bg-primary position-absolute top-0 start-0 m-3">
            {{ getCategoryName(prod.categoryId) }}
          </span>
        </div>
        <div class="card-body p-4">
          <h5 class="card-title fw-bold mb-1" style="cursor:pointer;" [routerLink]="['/products', prod.productID]">
            {{ prod.item_Name }}
          </h5>
          <p class="card-text text-muted mb-3 small">{{ prod.description }}</p>
          <div class="d-flex justify-content-between text-muted small mb-3">
            <span><i class="fas fa-boxes me-1"></i>Qty: {{ prod.quantity }}</span>
            <span><i class="fas fa-shopping-cart me-1"></i>Sold: {{ prod.solditems }}</span>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-primary flex-grow-1" (click)="openEditModal(prod)">
              <i class="fas fa-edit me-1"></i>Edit
            </button>
            <button class="btn btn-outline-danger flex-grow-1" (click)="onDelete(prod.productID)">
              <i class="fas fa-trash me-1"></i>Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="products.length === 0" class="text-center py-5 col-12">
      <i class="fas fa-box-open fa-5x text-muted mb-3"></i>
      <h3 class="text-muted">No products found.</h3>
      <button class="btn btn-primary mt-3" routerLink="/products/add">Add First Product</button>
    </div>
  </div>
</div>

<div class="modal-backdrop-custom" *ngIf="showEditModal" (click)="closeEditModal()"></div>
<div class="modal-custom" *ngIf="showEditModal">
  <div class="modal-dialog-custom shadow-lg" (click)="$event.stopPropagation()">
    <div class="modal-header-custom">
      <h5 class="mb-0 fw-bold"><i class="fas fa-edit me-2"></i>Edit Product</h5>
      <button class="btn-close" (click)="closeEditModal()"></button>
    </div>
    <div class="modal-body-custom">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Product Name</label>
          <input type="text" class="form-control" [(ngModel)]="editForm.item_Name">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Price</label>
          <input type="number" class="form-control" [(ngModel)]="editForm.price" min="0">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Category</label>
          <select class="form-select" [(ngModel)]="editForm.categoryId">
            <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Quantity</label>
          <input type="number" class="form-control" [(ngModel)]="editForm.quantity" min="0">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Sold Items</label>
          <input type="number" class="form-control" [(ngModel)]="editForm.solditems" min="0">
        </div>
        <div class="col-12">
          <label class="form-label fw-semibold">Description</label>
          <textarea class="form-control" [(ngModel)]="editForm.description" rows="3"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer-custom">
      <button class="btn btn-outline-secondary px-4" (click)="closeEditModal()">Cancel</button>
      <button class="btn btn-primary px-4" (click)="onUpdateProduct()" [disabled]="saving">
        <span *ngIf="saving" class="spinner-border spinner-border-sm me-2"></span>
        {{ saving ? 'Saving...' : 'Update Product' }}
      </button>
    </div>
  </div>
</div>
