<div class="not-found-container">
  <div class="content text-center">
    <div class="error-code">404</div>
    <h1 class="display-4 fw-bold mb-3">Page Not Found</h1>
    <p class="lead text-muted mb-5">Oops! The page you are looking for does not exist or has been moved.</p>
    
    <div class="d-flex justify-content-center gap-3">
      <a routerLink="/products" class="btn btn-primary btn-lg px-4 shadow-sm">
        <i class="fas fa-home me-2"></i>Go to Home
      </a>
      <button class="btn btn-outline-secondary btn-lg px-4" onclick="window.history.back()">
        <i class="fas fa-arrow-left me-2"></i>Go Back
      </button>
    </div>
  </div>
</div>
