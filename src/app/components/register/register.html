<div class="register-container">
  <div class="register-card">
    <h1>Create Account</h1>
    <p>Join us to start shopping or selling</p>
    <form (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" [(ngModel)]="model.FirstName" name="FirstName" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" [(ngModel)]="model.LastName" name="LastName" required>
        </div>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="model.UserName" name="UserName" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="model.Email" name="Email" required>
      </div>
      <div class="row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" [(ngModel)]="model.PassWord" name="PassWord" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" [(ngModel)]="model.ConfirmPassword" name="ConfirmPassword" required>
        </div>
      </div>
      <button type="submit" [disabled]="loading">
        <span *ngIf="!loading">Register</span>
        <span *ngIf="loading">Creating account...</span>
      </button>
    </form>
    <div class="footer">
      Already have an account? <a routerLink="/login">Login</a>
    </div>
  </div>
</div>
