<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white py-3">
          <h3 class="card-title mb-0"><i class="fas fa-plus-circle me-2"></i>Add New Product</h3>
        </div>
        <div class="card-body p-4">
          <form (ngSubmit)="onSubmit()" #productForm="ngForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Product Name</label>
                <input type="text" class="form-control" name="Item_Name" [(ngModel)]="product.Item_Name" required placeholder="Enter product name">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Category</label>
                <select class="form-select" name="CategoryId" [(ngModel)]="product.CategoryId" required>
                  <option [ngValue]="null" disabled>Select Category</option>
                  <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Price ($)</label>
                <input type="number" class="form-control" name="price" [(ngModel)]="product.price" required min="0">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Quantity</label>
                <input type="number" class="form-control" name="quantity" [(ngModel)]="product.quantity" required min="0">
              </div>
              <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Sold Items</label>
                <input type="number" class="form-control" name="solditems" [(ngModel)]="product.solditems" min="0">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Description</label>
              <textarea class="form-control" name="Description" [(ngModel)]="product.Description" rows="3" placeholder="Enter product description"></textarea>
            </div>
            <div class="mb-4">
              <label class="form-label fw-bold">Product Images</label>
              <input type="file" class="form-control" (change)="onFileChange($event)" multiple accept="image/*">
              <small class="text-muted">You can select multiple images.</small>
            </div>
            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
              <button type="button" class="btn btn-outline-secondary px-4" routerLink="/products">
                <i class="fas fa-arrow-left me-2"></i>Cancel
              </button>
              <button type="button" class="btn btn-light px-4" (click)="productForm.reset()">
                <i class="fas fa-eraser me-2"></i>Clear
              </button>
              <button type="submit" class="btn btn-primary px-5" [disabled]="!productForm.valid || loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                {{ loading ? 'Saving...' : 'Add Product' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
