<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="display-6 fw-bold text-primary">Categories</h1>
    <button class="btn btn-primary px-4 shadow-sm" (click)="openAddModal()">
      <i class="fas fa-folder-plus me-2"></i>New Category
    </button>
  </div>

  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div class="row g-4" *ngIf="!loading">
    <div *ngFor="let cat of categories" class="col-6 col-md-4 col-lg-3">
      <div class="card h-100 border-0 shadow-sm category-card text-center p-3 transition-up" [routerLink]="['/categories', cat.id]" style="cursor:pointer;">
        <div class="card-body">
          <div class="category-icon mb-3 bg-light rounded-circle mx-auto d-flex align-items-center justify-content-center overflow-hidden" style="width: 80px; height: 80px;">
            <img *ngIf="cat.picture" [src]="cat.picture" class="w-100 h-100 object-fit-cover" alt="Category Image">
            <i *ngIf="!cat.picture" class="fas fa-layer-group fa-2x text-primary"></i>
          </div>
          <h5 class="card-title fw-bold">{{ cat.name }}</h5>
          <p class="text-muted small">{{ cat.description }}</p>
          <div class="mt-3 d-flex justify-content-center gap-2">
            <button class="btn btn-sm btn-outline-primary px-3" (click)="openEditModal(cat)">
              <i class="fas fa-edit me-1"></i>Edit
            </button>
            <button class="btn btn-sm btn-outline-danger px-3" (click)="onDelete(cat.id)">
              <i class="fas fa-trash me-1"></i>Delete
            </button>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="categories.length === 0" class="text-center py-5 col-12">
      <i class="fas fa-folder-open fa-4x text-muted mb-3"></i>
      <h3 class="text-muted">No categories found.</h3>
      <button class="btn btn-primary mt-3" (click)="openAddModal()">Add First Category</button>
    </div>
  </div>
</div>

<div class="modal-backdrop-custom" *ngIf="showModal" (click)="closeModal()"></div>
<div class="modal-custom" *ngIf="showModal">
  <div class="modal-dialog-custom shadow-lg" (click)="$event.stopPropagation()">
    <div class="modal-header-custom">
      <h5 class="mb-0 fw-bold">
        <i class="fas fa-folder me-2"></i>{{ isEditMode ? 'Edit Category' : 'New Category' }}
      </h5>
      <button class="btn-close" (click)="closeModal()"></button>
    </div>
    <div class="modal-body-custom">
      <div class="mb-3">
        <label class="form-label fw-semibold">Category Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="form.name" placeholder="Enter category name">
      </div>
      <div class="mb-3" *ngIf="!isEditMode">
        <label class="form-label fw-semibold">Category Image</label>
        <input type="file" class="form-control" (change)="onFileChange($event)" accept="image/*">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Description</label>
        <textarea class="form-control" [(ngModel)]="form.description" rows="3" placeholder="Optional description"></textarea>
      </div>
    </div>
    <div class="modal-footer-custom">
      <button class="btn btn-outline-secondary px-4" (click)="closeModal()">Cancel</button>
      <button class="btn btn-primary px-4" (click)="onSave()" [disabled]="!form.name.trim() || saving">
        <span *ngIf="saving" class="spinner-border spinner-border-sm me-2"></span>
        {{ saving ? 'Saving...' : (isEditMode ? 'Update' : 'Create') }}
      </button>
    </div>
  </div>
</div>
